services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imagora
      POSTGRES_PASSWORD: imagora
      POSTGRES_DB: imagora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "4100:4100"
    depends_on:
      - postgres
      - redis
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4100
      WEB_ORIGIN: http://127.0.0.1:3100
      IMAGORA_STORE_PATH: /workspace/data/imagora-store.json
      DATABASE_URL: postgresql://imagora:imagora@postgres:5432/imagora
      REDIS_URL: redis://redis:6379
      DATA_STORE: json
      QUEUE_PROVIDER: inline
      IMAGE_PROVIDER_DEFAULT: mock
      STORAGE_PROVIDER: inline
      PAYMENT_PROVIDER: mock
      SAFETY_PROVIDER: local
      ORDER_PENDING_TTL_MINUTES: 30
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_AUTH_MAX: 20
      RATE_LIMIT_GENERATION_MAX: 30
      RATE_LIMIT_UPLOAD_MAX: 20
      RATE_LIMIT_DOWNLOAD_MAX: 60
      UPLOAD_MAX_BYTES: 5242880
      UPLOAD_MAX_BASE64_CHARS: 8000000
      UPLOAD_MAX_DIMENSION: 8192
      UPLOAD_REFERENCE_TTL_DAYS: 1
      FEATURE_GENERATION_ENABLED: "true"
      FEATURE_PAYMENTS_ENABLED: "true"
      FEATURE_UPLOADS_ENABLED: "true"
      FEATURE_DOWNLOADS_ENABLED: "true"
      ALERT_GENERATION_FAILURE_RATE: 0.35
      ALERT_GENERATION_BACKLOG_MAX: 25
      ALERT_STALE_RUNNING_MINUTES: 10
      ALERT_STALE_RUNNING_TASKS_MAX: 0
      ALERT_PENDING_ORDERS_MAX: 50
      ALERT_PAYMENT_AMOUNT_MISMATCH_MAX: 0
      ALERT_HTTP_FAILURE_RATE: 0.05
    volumes:
      - ..:/workspace

  worker:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:worker"
    depends_on:
      - api
    environment:
      IMAGORA_STORE_PATH: /workspace/data/imagora-store.json
      WORKER_POLL_INTERVAL_MS: 1500
      DATABASE_URL: postgresql://imagora:imagora@postgres:5432/imagora
      REDIS_URL: redis://redis:6379
      DATA_STORE: json
      QUEUE_PROVIDER: inline
      IMAGE_PROVIDER_DEFAULT: mock
      STORAGE_PROVIDER: inline
      SAFETY_PROVIDER: local
    volumes:
      - ..:/workspace

  web:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web -- --hostname 0.0.0.0"
    depends_on:
      - api
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4100
    volumes:
      - ..:/workspace

volumes:
  postgres-data:
